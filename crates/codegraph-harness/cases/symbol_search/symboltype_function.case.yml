id: symbol_search.symboltype_function
description: 'P9 options: symbol_search with symbolType=function — filters out the Module re-export entry.'
setup:
  fixture: languages/rust/basic.rs
invoke:
  tool: codegraph_symbol_search
  args:
    query: compute_total
    symbolType: function
    compact: true
expect:
  match: contains
  data:
    results:
    - match_reason: SymbolName
      symbol:
        docstring: null
        is_public: true
        kind: Function
        location:
          column: 0
          end_column: 10000
          end_line: 11
          file: ${fixture}
          line: 9
        name: compute_total
        signature: null
        visibility: public
