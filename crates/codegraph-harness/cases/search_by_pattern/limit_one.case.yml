id: search_by_pattern.limit_one
description: 'P9 options: search_by_pattern with limit=1 returns at most one match.'
setup:
  fixture: languages/rust/basic.rs
invoke:
  tool: codegraph_search_by_pattern
  args:
    pattern: pub fn
    limit: 1
expect:
  match: contains
  data:
    matches:
    - kind: function
      line_end: 11
      line_start: 9
      matched_in: signature
      matched_text: 'pub fn compute_total(order: &Order) -> u32 {'
      name: compute_total
      path: ${fixture}
      signature: 'pub fn compute_total(order: &Order) -> u32 {'
    pattern: pub fn
    scope: any
