id: find_dead_imports.workspace_wide
description: 'P9 OSS scope: find_dead_imports without a uri scans the whole workspace.'
setup:
  fixture: languages/python/with_dead_imports.py
invoke:
  tool: codegraph_find_dead_imports
  args: {}
expect:
  match: contains
  data:
    dead_count: 0
    dead_imports: []
    scanned_file: null
    total_imports: 4
    unresolved_count: 4
    unresolved_imports:
    - file: ${fixture}
      imported_module: json
    - file: ${fixture}
      imported_module: math
    - file: ${fixture}
      imported_module: os
    - file: ${fixture}
      imported_module: sys
