  data:
    complexity: null
    has_tests: false
    is_deprecated: false
    is_public: true
    lines_of_code: 12
    reference_count: 2
    symbol:
      docstring: null
      is_public: true
      kind: Class
      location:
        column: 0
        end_column: 10000
        end_line: 26
        file: ${fixture}
        line: 15
      name: Animal
      signature: null
      visibility: public
