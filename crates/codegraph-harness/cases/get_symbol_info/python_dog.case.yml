id: get_symbol_info.python_dog
description: 'P8 cross-lang nav: symbol info for the Dog subclass in the Python fixture.'
setup:
  fixture: languages/python/classes_decorators_comprehensions.py
invoke:
  tool: codegraph_get_symbol_info
  args:
    uri: file://${fixture}
    line: 24
expect:
