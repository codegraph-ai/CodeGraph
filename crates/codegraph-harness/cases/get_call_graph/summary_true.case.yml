id: get_call_graph.summary_true
description: 'P9 options: get_call_graph with summary=true returns a condensed summary.'
setup:
  fixture: languages/rust/basic.rs
invoke:
  tool: codegraph_get_call_graph
  args:
    uri: file://${fixture}
    line: 24
    summary: true
    depth: 2
expect:
  match: contains
  data:
    summary:
      callee_count: 2
      caller_count: 0
      depth: 2
      direction: both
    symbol:
      col_end: 10000
      col_start: 0
      depth: 0
      id: '3'
      language: ''
      line_end: 26
      line_start: 24
      name: final_price
      path: ${fixture}
      signature: 'pub fn final_price(order: &Order, discount_percent: u32) -> u32 {'
