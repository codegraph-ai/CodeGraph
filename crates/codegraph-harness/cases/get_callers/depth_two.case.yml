id: get_callers.depth_two
description: 'P9 options: get_callers with depth=2 follows transitive callers (final_price → apply_discount → compute_total).'
setup:
  fixture: languages/rust/basic.rs
invoke:
  tool: codegraph_get_callers
  args:
    uri: file://${fixture}
    line: 8
    depth: 2
expect:
  match: contains
  data:
    callers:
    - call_site:
        column: 0
        end_column: 10000
        end_line: 21
        file: ${fixture}
        line: 18
      depth: 1
      symbol:
        docstring: null
        is_public: false
        kind: Function
        location:
          column: 0
          end_column: 10000
          end_line: 21
          file: ${fixture}
          line: 18
        name: apply_discount
        signature: 'fn apply_discount(&self, percent: u32) -> u32 {'
        visibility: private
    - call_site:
        column: 0
        end_column: 10000
        end_line: 26
        file: ${fixture}
        line: 24
      depth: 2
      symbol:
        docstring: null
        is_public: true
        kind: Function
        location:
          column: 0
          end_column: 10000
          end_line: 26
          file: ${fixture}
          line: 24
        name: final_price
        signature: 'pub fn final_price(order: &Order, discount_percent: u32) -> u32 {'
        visibility: public
    fallback_message: No symbol at line 8. Using nearest symbol 'compute_total' instead.
    symbol_name: compute_total
    used_fallback: true
