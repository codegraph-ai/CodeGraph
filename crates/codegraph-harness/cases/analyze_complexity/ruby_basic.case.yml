id: analyze_complexity.ruby_basic
description: 'P8 cross-lang analysis: complexity per function in the Ruby fixture.'
setup:
  fixture: languages/ruby/basic.rb
invoke:
  tool: codegraph_analyze_complexity
  args:
    uri: file://${fixture}
expect:
  match: contains
  data:
    functions:
    - complexity: 1
      details:
        complexity_branches: 0
        complexity_early_returns: 0
        complexity_exceptions: 0
        complexity_logical_ops: 0
        complexity_loops: 0
        complexity_nesting: 0
        lines_of_code: 3
      grade: A
      line_end: 14
      line_start: 12
      name: compute_total
    - complexity: 1
      details:
        complexity_branches: 0
        complexity_early_returns: 0
        complexity_exceptions: 0
        complexity_logical_ops: 0
        complexity_loops: 0
        complexity_nesting: 0
        lines_of_code: 4
      grade: A
      line_end: 10
      line_start: 7
      name: initialize
    - complexity: 1
      details:
        complexity_branches: 0
        complexity_early_returns: 0
        complexity_exceptions: 0
        complexity_logical_ops: 0
        complexity_loops: 0
        complexity_nesting: 0
        lines_of_code: 4
      grade: A
      line_end: 21
      line_start: 18
      name: apply_discount
    - complexity: 2
      details:
        complexity_branches: 0
        complexity_early_returns: 0
        complexity_exceptions: 0
        complexity_logical_ops: 0
        complexity_loops: 1
        complexity_nesting: 1
        lines_of_code: 3
      grade: A
      line_end: 30
      line_start: 28
      name: collect_totals
    recommendations: []
    summary:
      above_threshold: 0
      average_complexity: 1.25
      max_complexity: 2
      overall_grade: A
      threshold: 10
      total_functions: 4
