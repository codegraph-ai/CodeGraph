id: analyze_complexity.cpp_summary
description: 'P9 cross-lang options: analyze_complexity on cpp with summary=true.'
setup:
  fixture: languages/cpp/basic.cpp
invoke:
  tool: codegraph_analyze_complexity
  args:
    uri: file://${fixture}
    summary: true
expect:
  match: contains
  data:
    summary:
      above_threshold: 0
      average_complexity: 1.0
      max_complexity: 1
      overall_grade: A
      threshold: 10
      total_functions: 7
