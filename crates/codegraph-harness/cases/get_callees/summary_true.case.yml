id: get_callees.summary_true
description: 'P9 options: get_callees with summary=true returns counts only.'
setup:
  fixture: languages/rust/basic.rs
invoke:
  tool: codegraph_get_callees
  args:
    uri: file://${fixture}
    line: 17
    summary: true
expect:
  match: contains
  data:
    callees:
    - call_site:
        column: 0
        end_column: 10000
        end_line: 11
        file: ${fixture}
        line: 9
      depth: 1
      symbol:
        docstring: null
        is_public: true
        kind: Function
        location:
          column: 0
          end_column: 10000
          end_line: 11
          file: ${fixture}
          line: 9
        name: compute_total
        signature: 'pub fn compute_total(order: &Order) -> u32 {'
        visibility: public
    fallback_message: No symbol at line 17. Using nearest symbol 'apply_discount' instead.
    symbol_name: apply_discount
    used_fallback: true
